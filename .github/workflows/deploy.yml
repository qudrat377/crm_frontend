name: Deploy CRM Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. Frontend papkasiga o'tish
            cd /var/www/crm-frontend
            
            # 2. Yangi kodni tortish
            git pull origin main
            
            # 3. Kutubxonalarni yangilash
            npm install
            
            # 4. Loyihani build qilish (Vite yoki React uchun)
            npm run build
            
            # 5. PM2 orqali restart berish (yoki Nginx ishlatayotgan bo'lsangiz shunchaki build kifoya)
            pm2 restart crm-frontend --update-env